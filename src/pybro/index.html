<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pybro Dashboard</title>
    <style>
        :root {
            --bg: #0b0f19;
            --surface: #131a2b;
            --border: #2a3350;
            --text: #e0e6f0;
            --accent: #6e8efb;
            --green: #00e676;
            --red: #ff5252;
            --radius: 12px;
            --shadow: 0 8px 24px rgba(0,0,0,0.6);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 2rem;
            max-width: 960px;
            margin: 0 auto;
            line-height: 1.5;
        }
        h1 {
            color: var(--accent);
            font-weight: 600;
            font-size: 1.9rem;
            margin-bottom: 1.2rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
        }
        .ui-row {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .ui-row > * { flex: 1; min-width: 0; }
        .component {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.2rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #a0b3d9;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #1a2236;
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            font-family: 'Fira Code', monospace;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(110,142,251,0.3);
        }
        textarea {
            height: 120px;
            resize: vertical;
            background: #0a0f1c;
            color: var(--green);
            font-family: 'Fira Code', monospace;
            line-height: 1.4;
        }
        button {
            background: linear-gradient(135deg, #2d3b5a 0%, #1a2740 100%);
            color: #fff;
            padding: 0.75rem 1.5rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        button:hover {
            background: linear-gradient(135deg, #3f5182 0%, #2a3a5e 100%);
            border-color: var(--accent);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(110,142,251,0.3);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
        }
        th, td {
            padding: 0.9rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            background: #1e2a44;
            color: var(--accent);
            font-weight: 600;
        }
        .terminal {
            background: #0a0f1c;
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 8px;
            white-space: pre-wrap;
            color: var(--green);
            font-family: 'Fira Code', monospace;
            min-height: 60px;
            margin-top: 0.5rem;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--surface);
            border: 2px solid var(--red);
            padding: 2rem;
            border-radius: var(--radius);
            max-width: 500px;
            width: 90%;
        }
        #sse-status {
            position: fixed;
            top: 15px;
            right: 15px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: gray;
            transition: background 0.2s;
            z-index: 100;
        }
        #page-nav {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
        }
        .page-nav-btn {
            background: none;
            border: none;
            color: var(--text);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-weight: 600;
            opacity: 0.7;
            border-radius: var(--radius) var(--radius) 0 0;
            transition: opacity 0.2s, background 0.2s;
        }
        .page-nav-btn.active {
            opacity: 1;
            background: var(--surface);
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            margin-bottom: -2px;
        }
        .tab-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.3rem;
        }
        .tab-btn {
            background: none;
            border: none;
            color: var(--text);
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            opacity: 0.7;
            border-radius: var(--radius) var(--radius) 0 0;
        }
        .tab-btn.active {
            opacity: 1;
            background: var(--surface);
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            margin-bottom: -1px;
        }
        .page-content { display: none; }
        .page-content.active { display: block; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <div id="sse-status" title="SSE connection status"></div>
    <div id="page-nav"></div>
    <div id="app-canvas"></div>

    <div id="gatekeeper-modal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--red); margin-top: 0;">⚠️ ACCESS AUTHORIZATION REQUIRED</h3>
            <p><strong>Intent Vector:</strong> <span id="gate-desc"></span></p>
            <p><strong>Payload Target String:</strong> <code id="gate-cmd" style="background:#0a0f1c; padding:8px; display:block; margin-top:8px; color:var(--green)"></code></p>
            <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem;">
                <button id="gate-deny-btn" type="button">Deny</button>
                <button id="gate-approve-btn" type="button" style="background: var(--red); color:#fff;">Approve</button>
            </div>
        </div>
    </div>

    <script type="module" src="/static/app.js"></script>
</body>
</html>
